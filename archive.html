<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blank Object Archive</title>
  <style>
    @font-face {
      font-family: 'TSCPaperletterOTF';
      src: local('TSCPaperletterOTF'), local('TSCPaperletter'), local('TSC원고지글씨OTF'), local('TSC원고지글씨');
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'TSCPaperletterOTF', sans-serif;
      background: #f7f7f7;
      color: #222;
      min-height: 100vh;
    }

    /* ── Header ── */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #f7f7f7;
      border-bottom: 1px solid #ddd;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .site-title {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
      white-space: nowrap;
      color: #222;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .site-title:hover {
      opacity: 0.6;
    }

    .search-wrap {
      flex: 1;
      display: flex;
      justify-content: flex-end;
    }

    .search-input {
      width: 160px;
      padding: 5px 10px;
      border: 1px solid #ccc;
      border-radius: 20px;
      font-size: 12px;
      background: #fff;
      outline: none;
      transition: width 0.3s ease, border-color 0.2s;
    }

    .search-input:focus {
      width: 220px;
      border-color: #888;
    }

    .header-icon {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #555;
      font-size: 16px;
      border-radius: 50%;
      transition: background 0.2s;
    }

    .header-icon:hover {
      background: #eee;
    }

    .column-control-wrap {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-left: 10px;
      margin-right: 4px;
    }

    .col-btn {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: none;
      border: 1px solid #ccc;
      border-radius: 50%;
      font-size: 16px;
      font-family: 'TSCPaperletterOTF', sans-serif;
      font-weight: 500;
      color: #555;
      transition: background 0.2s, border-color 0.2s;
      outline: none;
      user-select: none;
    }

    .col-btn:hover {
      background: #eee;
      border-color: #888;
    }

    .col-btn:active {
      background: #ddd;
    }

    /* ── Grid ── */
    .grid-main {
      padding: 0 16px;
    }

    .object-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
    }

    .grid-cell {
      border: 1px solid #ddd;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      margin: -0.5px;
      /* collapse borders */
      position: relative;
      z-index: 1;
    }

    .grid-cell:hover {
      transform: scale(1.1);
      z-index: 2;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .grid-cell img {
      width: 80%;
      height: 80%;
      object-fit: contain;
      display: block;
      pointer-events: none;
    }

    /* ── Footer area ── */
    .footer-area {
      text-align: center;
      padding: 80px 0 0 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .add-btn {
      display: inline-block;
      padding: 10px 32px;
      background: #f05a4a;
      color: #fff;
      font-family: 'TSCPaperletterOTF', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s ease, transform 0.15s ease;
      letter-spacing: 0.04em;
    }

    .add-btn:hover {
      background: #d94b3a;
      transform: translateY(-1px);
    }

    .s2-footer {
      margin-top: 100px;
      font-size: clamp(14px, 1.0vw, 18px);
      background: #ccc;
      color: #222;
      width: 100%;
      padding: 30px 20px;
      text-align: center;
      border-radius: 30px 30px 0 0;
      box-sizing: border-box;
      font-family: 'TSCPaperletterOTF', sans-serif;
    }

    /* ── Modal overlay ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-card {
      background: #fff;
      border-radius: 12px;
      width: 360px;
      max-width: 92vw;
      padding: 28px 24px 20px;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 16px;
      font-size: 18px;
      cursor: pointer;
      color: #888;
      background: none;
      border: none;
    }

    .modal-img-wrap {
      width: 100%;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .modal-img-wrap img {
      max-width: 70%;
      max-height: 70%;
      object-fit: contain;
    }

    .modal-name {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #111;
    }

    .modal-desc {
      font-size: 13px;
      color: #555;
      line-height: 1.6;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header class="site-header">
    <a href="index.html" class="site-title">Blank Object Archive</a>
    <div class="search-wrap">
      <input class="search-input" type="text" id="search-input" placeholder="🔍 검색">
    </div>
    <div class="column-control-wrap">
      <button class="col-btn" id="col-dec-btn" title="열 줄이기 (크게 보기)">+</button>
      <button class="col-btn" id="col-inc-btn" title="열 늘리기 (작게 보기)">-</button>
    </div>
    <a href="index.html" class="header-icon" title="홈으로" style="text-decoration:none;">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
        <polyline points="9 22 9 12 15 12 15 22" />
      </svg>
    </a>
  </header>

  <!-- Grid -->
  <main class="grid-main">
    <div class="object-grid" id="object-grid">
      <!-- injected by JS -->
    </div>
  </main>

  <!-- Footer -->
  <div class="footer-area">
    <button class="add-btn" id="add-btn">물건 추가하기</button>
    <footer class="s2-footer">
      Blank Object Archive &copy; 2026. Suhyun All rights reserved.
    </footer>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-card">
      <button class="modal-close" id="modal-close">✕</button>
      <div class="modal-img-wrap">
        <img id="modal-img" src="" alt="">
      </div>
      <p class="modal-name" id="modal-name"></p>
      <p class="modal-desc" id="modal-desc"></p>
    </div>
  </div>

  <script>
    // ── Object data (uses assets/ images in numerical order) ──
    const objects = [
      { id: 1, file: '1_pizza.jpg', name: '피자 세이버', desc: '피자 박스 안에서 뚜껑이 내려앉지 않도록 받쳐주는 작은 플라스틱 받침대' },
      { id: 2, file: '2_twist.png', name: '트위스트 타이', desc: '금속 와이어를 얇은 종이나 플라스틱 조각으로 감싸 구부리고 모양을 유지할 수 있도록 만든 패스너' },
      { id: 3, file: '3_traffic.png', name: '라바콘, 트래픽 콘', desc: '도로나 공사 현장에서 차량 통행을 유도하는 주황색 원뿔 표지물' },
      { id: 4, file: '4_sipstick.png', name: '십스틱', desc: '음료를 마실 때 사용하는 가는 관 모양의 도구' },
      { id: 5, file: '5_breadclip.png', name: '브레드 클립', desc: '식빵 봉지 입구를 밀봉하는 작은 플라스틱 클립' },
      { id: 6, file: '6_jambokso.png', name: '잠복소', desc: '겨울 동안 해충이 나무 아래로 내려와 월동할 은신처를 만들어 포집하는 방식' },
      { id: 7, file: '7_nemyss.png', name: '네메스', desc: '이집트 파라오가 쓰던 헤드드레스 형태의 머리 장식' },
      { id: 8, file: '8_adballoon.png', name: '애드벌룬', desc: '상업시설 앞에서 바람에 흔들리며 홍보 역할을 하는 대형 풍선' },
      { id: 9, file: '9_mollyguard.png', name: '몰리가드', desc: '실수로 버튼을 누르지 못하도록 씌우는 보호 덮개' },
      { id: 10, file: '10_doorguard.png', name: '도어가드', desc: '문 끝에 끼워 문이 벽에 부딪히는 것을 막는 고무 마개' },
      { id: 11, file: '11_maracas.png', name: '마라카스', desc: '손으로 흔들어 소리를 내는 타악기' },
      { id: 12, file: '12_sealingknife.png', name: '실링칼, 랩칼', desc: '봉투나 포장지를 열 때 사용하는 납작한 칼 모양 도구' },
      { id: 13, file: '13_ribbonmarker.png', name: '가름', desc: '책에 끈 형태로 달려 있는 얇은 리본 북마크' },
      { id: 14, file: '14_confetti.png', name: '컨페티', desc: '축제나 파티에서 뿌리는 알록달록한 작은 종이 조각들' },
      { id: 15, file: '15_Okchundang.png', name: '옥춘당', desc: '쌀가루로 만든 한국 전통 사탕' },
      { id: 16, file: '16_aglet.png', name: '에글렛', desc: '신발끈이나 옷끈 끝에 붙어 있는 금속 또는 플라스틱 캡' },
      { id: 17, file: '17_baran.png', name: '바란', desc: '도시락이나 초밥 사이에 넣는 초록색 플라스틱 잎 장식' },
      { id: 18, file: '18_lashtab.png', name: '래 탭', desc: '스트랩·끈·카라비너 등을 통과시켜 마달거나 고정하는 용도' },
      { id: 19, file: '19_nail.png', name: '네일 파일', desc: '손톱을 갈아 형태를 만들거나 거친 단면을 정리하는 네일 케어 도구' },
      { id: 20, file: '20_sealingwax.png', name: '실링왁스', desc: '편지나 문서 봉인에 사용하는 밀봉용 왁스' },
      { id: 21, file: '21_Buoy.png', name: '부표', desc: '바다나 강에 떠 있어 항로나 위험 구역을 표시하는 기구' },
      { id: 22, file: '22_NavalMine.png', name: '기뢰', desc: '수중에 설치해 적 선박을 파괴하는 폭발 무기' },
      { id: 23, file: '23_bollard.png', name: '볼라드', desc: '보행자 구역이나 도로 경계에 세우는 짧은 기둥 모양 구조물' },
      { id: 24, file: '24_Fruit tray.png', name: '난좌', desc: '과일을 보호하며 담아 두는 받침' },
      { id: 25, file: '25_Egg code.png', name: '난각 번호', desc: '달걀 껍데기에 찍힌 생산 정보 코드' },
      { id: 26, file: '26_eggcarton.png', name: '달걀 판', desc: '달걀을 개별 칸에 넣어 보관하는 종이 혹은 플라스틱 용기' },
      { id: 27, file: '27_shiphelm.png', name: '타륜', desc: '배의 방향을 조종하는 원형 바퀴 모양 장치' },
      { id: 28, file: '28_Bale Silage.png', name: '곤포 사일리지', desc: '건초나 사료를 둥글게 압축해 비닐로 싼 농업용 뭉치' },
      { id: 29, file: '29_kee.png', name: '키', desc: '곡식이나 돌, 쭉정이를 골라내는 전통 농기구' },
      { id: 30, file: '30_doe.png', name: '(쌀)되', desc: '전통적으로 쌀을 부피로 재는 단위' },
      { id: 31, file: '31_honeystick.png', name: '꿀봉, 허니디', desc: '꿀을 붓는 스푼스틱' },
      { id: 32, file: '32_Garland.png', name: '가랜드', desc: '파티나 장식에 쓰이는 연속적으로 연결된 종이나 천 장식' },
      { id: 33, file: '33_messtin.png', name: '반합', desc: '야외 취사에 사용하는 알루미늄 조리도구' },
      { id: 34, file: '34_starping.png', name: '스타핑', desc: '겉 포장과 제품 사이 공간에 채워 넣는 종이나 솜 따위의 포장재' },
      { id: 35, file: '35_sprinkle.png', name: '스프링클', desc: '케이크나 디저트 위에 뿌리는 알록달록한 설탕 장식.' },
      { id: 36, file: '36_hook pin.png', name: '양말 코핀', desc: ' 양말 앞코를 집어 고정하 포장용 핀' },
      { id: 37, file: '37_Tetrapod.png', name: '테트라포드', desc: '파도를 막기 위해 해안가에 쌓는 콘크리트 블록.' },
      { id: 38, file: '38_easel.png', name: '이젤', desc: '그림을 그릴 때 캔버스나 화판을 세우는 삼각 받침대' },
      { id: 39, file: '39_Equalizer.png', name: '이퀄라이저', desc: '음향 기기에서 주파수 대역별 음량을 조절하는 장치' },
      { id: 40, file: '40_Tumbleweed.png', name: '회전초, 텀블위드', desc: '바람에 굴러다니는 서부의 건조한 식물 덩어리' },
      { id: 41, file: '41_gavel.png', name: '의사봉', desc: '법정이나 경매에서 결정을 선언할 때 두드리는 나무 망치' },
      { id: 42, file: '42_albedo.png', name: '귤', desc: '귤 과육에 붙어 있는 흰 섬유질층' },
      { id: 43, file: '43_Sombrero.png', name: '솜브레로', desc: '넓은 챙이 특징인 멕시코 전통 모자' },
      { id: 44, file: '44_kelp noodles.png', name: '천사채', desc: '해조류를 가공해 만든 식품' },
      { id: 45, file: '45_mortar and pestle.png', name: '막자사발', desc: '재료를 빻거나 갈 때 사용하는 도자기로 만든 도구' },
      { id: 46, file: '46_crescent.png', name: '크리센트', desc: '창문·미닫이문에서 창짝을 프레임에 밀착 고정하는 잠금장치' },
      { id: 47, file: '47_ferrule.png', name: '국기봉', desc: '태극기를 고정해 게양하거나 보관할 때 쓰는 봉' },
      { id: 48, file: '48_Pull loops.png', name: '풀 룹스', desc: '가방이나 신발에 달린 손잡이용 고리' },
      { id: 49, file: '49_slide buckle.png', name: '왈자고리', desc: '벨트나 스트랩의 길이를 조절하는 슬라이딩 금속 버클' },
      { id: 50, file: '50_paper tube.png', name: '지', desc: '두루마리 화장지나 주방 타올 안에 있는 원통형 종이 심' },
    ];

    const grid = document.getElementById('object-grid');
    const searchInput = document.getElementById('search-input');
    const modalOverlay = document.getElementById('modal-overlay');
    const modalClose = document.getElementById('modal-close');
    const modalImg = document.getElementById('modal-img');
    const modalName = document.getElementById('modal-name');
    const modalDesc = document.getElementById('modal-desc');

    function renderGrid(list) {
      grid.innerHTML = '';
      list.forEach(obj => {
        const cell = document.createElement('div');
        cell.className = 'grid-cell';
        cell.innerHTML = `<img src="assets/${obj.file}" alt="${obj.name}" loading="lazy">`;
        cell.addEventListener('click', () => openModal(obj));
        grid.appendChild(cell);
      });
    }

    function openModal(obj) {
      modalImg.src = `assets/${obj.file}`;
      modalImg.alt = obj.name;
      modalName.textContent = obj.name;
      modalDesc.textContent = obj.desc;
      modalOverlay.classList.add('active');
    }

    modalClose.addEventListener('click', () => modalOverlay.classList.remove('active'));
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) modalOverlay.classList.remove('active');
    });

    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim().toLowerCase();
      const filtered = q ? objects.filter(o => o.name.toLowerCase().includes(q) || o.desc.toLowerCase().includes(q)) : objects;
      renderGrid(filtered);
    });

    // Grid column scaling controls
    let columnCount = 4;
    const colDecBtn = document.getElementById('col-dec-btn');
    const colIncBtn = document.getElementById('col-inc-btn');

    function updateGridColumns() {
      grid.style.gridTemplateColumns = `repeat(${columnCount}, 1fr)`;
    }

    colDecBtn.addEventListener('click', () => {
      if (columnCount > 2) {
        columnCount--;
        updateGridColumns();
      }
    });

    colIncBtn.addEventListener('click', () => {
      if (columnCount < 8) {
        columnCount++;
        updateGridColumns();
      }
    });

    // Initial render
    renderGrid(objects);
  </script>
</body>

</html>
